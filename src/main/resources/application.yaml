server:
  port: 8080

app:
  base-url: http://localhost:8080/
  max-file-size: 102400

spring:
  application:
    name: UserManagement

  servlet:
    multipart:
      enabled: true
      max-file-size: 1MB
      max-request-size: 1MB

  datasource:
    url: jdbc:mysql://localhost:3306/user_management?useSSL=false&serverTimezone=UTC
    username: root
    password:

  jackson:
    serialization:
      fail-on-empty-beans: false
    default-property-inclusion: non_null

  flyway:
    repair-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: update
    # show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@gmail.com
    password: your_app_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: TaK+HaV^uvCHEFsEVfypW#7g9^k*Z8$V
  expiration: 3600000